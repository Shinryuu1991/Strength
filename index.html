<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1D9E75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Iron Log">
  <title>Iron Log</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <div class="app-title">Iron Log</div>
      <div class="top-actions">
        <div class="edit-btn" id="editToggleBtn" onclick="toggleEditView()">Edit plan</div>
        <div style="position:relative">
          <div class="cycle-btn" id="cycleBtn" onclick="toggleDropdown('cycle')">C1</div>
          <div class="cw-dropdown" id="cycleDropdown">
            <div class="cw-dropdown-label">Cycle</div>
            <div class="cw-option" onclick="setCycle(1)">Cycle 1</div>
            <div class="cw-option" onclick="setCycle(2)">Cycle 2</div>
            <div class="cw-option" onclick="setCycle(3)">Cycle 3</div>
            <div class="cw-option" onclick="setCycle(4)">Cycle 4</div>
          </div>
        </div>
        <div style="position:relative">
          <div class="cycle-btn" id="weekBtn" onclick="toggleDropdown('week')">W1</div>
          <div class="cw-dropdown" id="weekDropdown">
            <div class="cw-dropdown-label">Week</div>
            <div class="cw-option" onclick="setWeek(1)">W1 — Build</div>
            <div class="cw-option" onclick="setWeek(2)">W2 — Overload</div>
            <div class="cw-option" onclick="setWeek(3)">W3 — Push</div>
            <div class="cw-option" onclick="setWeek(4)">W4 — Deload</div>
          </div>
        </div>
      </div>
    </div>

    <div style="padding:.75rem 1.5rem 0">
      <div class="view-toggle" id="mainViewToggle">
        <div class="vt-btn active" onclick="switchView('log')">Session Log</div>
        <div class="vt-btn" onclick="switchView('progress')">Progress</div>
      </div>
    </div>

    <!-- LOG VIEW -->
    <div class="view active" id="view-log">
      <div class="session-header">
        <div class="session-day" id="sessionDay">Monday — Push</div>
        <div class="session-subtitle" id="sessionSubtitle"></div>
      </div>
      <div class="day-tabs" id="dayTabs"></div>
      <div id="deloadBanner" class="deload-banner" style="display:none">
        Deload week — 2 sets, 50–60% of working weight. Focus on form, not load.
      </div>
      <div id="exerciseArea"></div>
      <button class="save-btn" onclick="saveSession()">Log Session</button>
    </div>

    <!-- PROGRESS VIEW -->
    <div class="view" id="view-progress">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="divider"></div>
      <div class="section-label">Lift progress</div>
      <div class="lift-selector" id="liftSelector"></div>
      <div class="chart-wrap">
        <div style="position:relative;width:100%;height:260px"><canvas id="progressChart"></canvas></div>
      </div>
      <div class="divider"></div>
      <div class="section-label">Personal records</div>
      <div class="pr-list" id="prList"></div>
    </div>

    <!-- EDIT VIEW -->
    <div class="view" id="view-edit">
      <div class="edit-header">
        <button class="back-btn" onclick="closeEditView()">← Back</button>
        <div class="edit-title">Edit programme</div>
      </div>
      <div class="edit-day-list" id="editDayList"></div>
      <button class="add-day-btn" onclick="addDay()">+ Add training day</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
